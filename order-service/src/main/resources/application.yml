spring:
  application:
    name: order-service
  mvc:
    problemdetails:
      # Return RFC-7807 application/problem+json for Spring's built-in MVC exceptions
      # too (404 no-handler, 405, 415, ...), matching our @RestControllerAdvice.
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/orderdb}
    username: ${SPRING_DATASOURCE_USERNAME:order}
    password: ${SPRING_DATASOURCE_PASSWORD:order}
  jpa:
    open-in-view: false              # explicit: no Hibernate Session held across the HTTP request
    hibernate:
      ddl-auto: validate             # Flyway owns the schema; Hibernate only validates against it
    properties:
      hibernate:
        default_batch_fetch_size: 50 # read-side: bound accidental N+1 on lazy associations
        jdbc:
          batch_size: 50             # write-side: collapse saveAll round-trips
  flyway:
    enabled: true                    # runs db/migration/V*.sql on startup, before JPA validation

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        # Phase 0: just enough to prove the service is alive and observable.
        # Phase 5 expands this (Prometheus, tracing) — keep the surface small until then.
        include: health,info,metrics
  endpoint:
    health:
      # Expose liveness/readiness groups so a container orchestrator can probe them.
      probes:
        enabled: true
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    phase: "2 - persistence"
